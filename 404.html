<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#38bdf8">
    <meta name="description" content="Page not found. Return to Pickleball Rules Quiz.">

    <title>Page not found - Pickleball Rules Quiz</title>

    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
    <link rel="icon" href="./icons/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="wt-app">
        <main class="wt-main">
            <div class="wt-container">

                <div class="wt-card wt-card--hero">
                    <h1 class="wt-h1" data-wt-wording="notFound.title">
                        Out of bounds.
                    </h1>

                    <p class="wt-muted" data-wt-wording="notFound.line1">
                        This page landed outside the court.

                    </p>

                    <p class="wt-muted" data-wt-wording="notFound.line2">
                        The good news: Pickleball Rules Quiz is still ready to play.
                    </p>

                    <div class="wt-actions">
                        <a href="./index.html" class="wt-btn wt-btn--primary" data-wt-wording="notFound.cta">
                            Back to the court
                        </a>
                    </div>
                </div>

            </div>


        </main>

        <footer id="wt-footer-root" class="wt-footer" role="contentinfo"></footer>
    </div>

    <!-- Config for wording + brand -->
    <script src="./config.js"></script>
    <script src="./email.js"></script>
    <script src="./footer.js"></script>

    <script>
        // Minimal wording + brand application (no UI.js dependency)
        (function () {
            function apply() {
                try {
                    const wording = window.WT_WORDING?.notFound || {};

                    document.querySelectorAll("[data-wt-wording]").forEach((el) => {
                        const key = el.getAttribute("data-wt-wording").split(".").pop();
                        if (wording[key]) el.textContent = wording[key];
                    });

                    const brand = window.WT_WORDING?.brand?.creatorLine;

                    if (brand) {
                        document
                            .querySelectorAll('[data-wt-brand="creatorLine"]')
                            .forEach((el) => el.textContent = brand);
                    }


                } catch (_) { }
            }

            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", apply);
            } else {
                apply();
            }
        })();
    </script>
</body>

</html>
