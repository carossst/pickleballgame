<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Payment successful. Your Pickleball Rules Quiz device unlock code is ready.">
  <meta name="robots" content="noindex, nofollow">

  <!-- PWA & UI (match index.html) -->
  <meta name="theme-color" content="#38bdf8" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pickleball Rules Quiz">

  <!-- Icons & manifest (match index.html) -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
  <link rel="icon" href="./icons/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="./icons/brand-logo-512.png">

  <title>Full Access Ready - Pickleball Rules Quiz</title>

  <!-- Styles -->
  <link rel="preload" href="./style.css" as="style">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="wt-page--doc">
    <a href="#main-content" class="wt-skip-link">Skip to main content</a>
  <div class="wt-app">
    <main id="main-content" class="wt-main">
      <div class="wt-container wt-container--doc">

        <!-- Header (landing-like branding) -->
        <div class="wt-card wt-card--hero">
          <div class="wt-row wt-row--spaced wt-success-hero-row">
            <a class="wt-branding" href="./index.html" id="wt-success-branding" aria-label="Pickleball Rules Quiz home">
              <img id="wt-success-logo" src="" alt="" class="wt-branding-logo wt-hidden" />
              <span id="wt-success-name" class="wt-branding-name"></span>
            </a>
            <div class="wt-badge" data-wt-wording="success.deviceBadge"></div>
          </div>

          <div class="wt-success-hero-copy">
            <h1 class="wt-h1" data-wt-wording="success.title"></h1>
            <p class="wt-sub" data-wt-wording="success.subtitle"></p>
          </div>
        </div>

        <!-- Full access code -->
        <div class="wt-card">
          <div class="wt-row wt-row--spaced">
            <div class="wt-meta">
              <strong data-wt-wording="success.codeLabel"></strong>
            </div>
            <button class="wt-btn wt-btn--secondary" id="copy-btn" type="button" data-wt-wording="success.copyCta">
            </button>
          </div>

          <div class="wt-code wt-success-code" id="code">PRQ-0000-0000</div>

          <div id="copy-status" class="wt-live wt-hidden wt-success-status" role="status" aria-live="polite">
          </div>

          <div class="wt-divider"></div>

          <p class="wt-muted wt-success-note--tight">
            <span data-wt-wording="success.txtSaveLine"></span>
            <span data-wt-wording="success.txtNoRecoverLine"></span>
          </p>
          <p class="wt-muted wt-success-note--follow" data-wt-wording="success.clearDataWarning"></p>
        </div>

        <!-- How to activate -->
        <div class="wt-card">
          <div class="wt-meta">
            <strong data-wt-wording="success.howToActivateTitle"></strong>
          </div>

          <ol class="wt-list">
            <li data-wt-wording="success.howToActivateStep1"></li>

            <li>
              <span data-wt-wording="success.howToActivateStep2Prefix"></span>
              <strong data-wt-wording="success.howToPlayLabel"></strong>
              ->
              <strong data-wt-wording="success.activateWithCodeLabel"></strong>
            </li>

            <li>
              <span data-wt-wording="success.howToActivateStep3Prefix"></span>
              <strong data-wt-wording="success.activateLabel"></strong>.
            </li>
          </ol>


        </div>

        <!-- What you get -->
        <div class="wt-card">
          <div class="wt-meta">
            <strong data-wt-wording="success.whatYouGetTitle"></strong>
          </div>

          <ul class="wt-list">
            <li>
              <span data-wt-wording="success.benefitFullAccessPrefix"></span>
              <strong>
                <span data-wt-poolsize></span>
                <span data-wt-wording="success.benefitFullAccessStrongSuffix"></span>
              </strong>
              <span data-wt-wording="success.benefitFullAccessSuffix"></span>
            </li>

            <li data-wt-wording="success.benefitUnlimited"></li>
          </ul>


        </div>

        <!-- Actions -->
        <div class="wt-card">
          <div class="wt-row wt-row--spaced">
            <a href="./index.html" class="wt-btn wt-btn--primary" data-wt-wording="success.ctaBackToGame">
            </a>

            <div class="wt-row wt-row--tight wt-row--end">
              <button id="download-code" class="wt-btn wt-btn--secondary" type="button"
                data-wt-wording="success.ctaDownload">
              </button>

              <button id="copy-again" class="wt-btn wt-btn--secondary" type="button"
                data-wt-wording="success.copyAgainCta">
              </button>
            </div>


          </div>

          <p class="wt-muted" data-wt-wording="success.shortcutHint"></p>
        </div>


        <!-- Footer note -->
        <p class="wt-muted wt-success-note wt-success-center-note" data-wt-wording="success.thankYouLine">
        </p>

        <!-- Support (single source of truth via WT_Email / WT_CONFIG.support) -->
        <p class="wt-muted wt-success-note wt-success-support">
          <span data-wt-wording="success.supportLabel"></span>
          <a href="#" id="wt-success-support-link">Contact us</a>
        </p>
      </div>

    </main>

    <footer id="wt-footer-root" class="wt-footer" role="contentinfo"></footer>


  </div>

  <!-- Scripts: keep config non-defer for inline success logic -->
  <script src="./config.js"></script>
  <script src="./wording.js"></script>
  <script src="./email.js"></script>
  <script src="./footer.js"></script>
  <script src="./success.js"></script>

</body>

</html>
